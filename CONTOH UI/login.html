        body {
            background-color: #111317; /* background */

<body class="min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-surface-container-low rounded-xl p-8 border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
<!-- Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 rounded-lg border border-outline-variant flex items-center justify-center mb-6 bg-surface-container-high/50">
<span class="material-symbols-outlined text-4xl text-primary font-light">computer</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Manajemen Pusat</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Silakan masuk untuk mengelola outlet</p>
</div>
<!-- Form -->
<form class="space-y-6">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-70">mail</span>
<input class="w-full bg-surface-variant border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-md text-body-md placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none" id="email" placeholder="admin@perusahaan.com" type="email">
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-70">lock</span>
<input class="w-full bg-surface-variant border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-md text-body-md placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none" id="password" placeholder="••••••••" type="password">
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-3 px-4 rounded-lg hover:bg-primary-fixed-dim transition-colors duration-200 mt-2 shadow-[0_0_15px_rgba(216,226,255,0.15)] hover:shadow-[0_0_20px_rgba(216,226,255,0.3)]" type="button">
                Masuk Sekarang
            </button>
</form>
<!-- Footer -->
<div class="mt-8 text-center">
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors underline-offset-4 hover:underline" href="#">
                Lupa password?
            </a>
</div>
</div>
