name: warnetps_manager
description: "Warnet & PS Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI Helpers
  intl: ^0.19.0             # Format tanggal & angka
  fl_chart: ^0.69.0          # Grafik laporan
  cached_network_image: ^3.4.1  # Load foto member
  image_picker: ^1.1.2       # Ambil foto dari kamera/galeri

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3